<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoGest Seguros - Sistema de Gestión de Siniestros</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <!-- HEADER -->
    <header class="header">
        <div class="logo">
            <h1>AutoGest Seguros</h1>
            <span>Sistema de Gestión de Siniestros</span>
        </div>
        <div class="user-menu">
            <div class="notifications" onclick="showNotifications()">
                <span>🔔</span>
            </div>
            <div class="user-info" onclick="toggleUserMenu()">
                <div class="user-details">
                    <div class="user-name" id="userNameDisplay">Juan Pérez</div>
                    <div class="user-role" id="userRoleDisplay">Supervisor</div>
                </div>
                <div class="avatar" id="userAvatar">JP</div>
            </div>
        </div>
    </header>

    <!-- CONTENEDOR PRINCIPAL -->
    <div class="container">
        <!-- Banner de bienvenida dinámico -->
        <div class="welcome-section" id="welcomeBanner"></div>

        <!-- Formulario de búsqueda avanzada -->
        <div class="search-section">
            <h3>
                <span>🔍</span>
                Búsqueda de Siniestros
            </h3>
            <div class="search-grid">
                <div class="search-field">
                    <label>Rango de fechas</label>
                    <div class="date-range">
                        <input type="date" id="fechaInicio" placeholder="Fecha inicial">
                        <input type="date" id="fechaFin" placeholder="Fecha final">
                    </div>
                </div>
                <div class="search-field">
                    <label>Compañía de seguros</label>
                    <select id="companiaSeguros">
                        <option value="">Todas las compañías</option>
                        <option value="seguros mx">Seguros MX</option>
                        <option value="aseguradora total">Aseguradora Total</option>
                        <option value="proteccion aseguradora">Protección Aseguradora</option>
                        <option value="seguros nacional">Seguros Nacional</option>
                    </select>
                </div>
                <div class="search-field">
                    <label>Número de póliza</label>
                    <input type="text" id="numPoliza" placeholder="Ingrese número de póliza">
                </div>
                <div class="search-field">
                    <label>Vehículo (placas/serie)</label>
                    <input type="text" id="vehiculo" placeholder="Placas o número de serie">
                </div>
                <div class="search-field">
                    <label>Cliente</label>
                    <input type="text" id="cliente" placeholder="Nombre del cliente">
                </div>
                <div class="search-field">
                    <label>Estado del siniestro</label>
                    <select id="estadoSiniestro">
                        <option value="">Todos los estados</option>
                        <option value="rechazado">Rechazado</option>
                        <option value="aceptado">Aceptado</option>
                        <option value="aceptado con deducible">Aceptado con pago de deducible</option>
                        <option value="aceptado sin deducible">Aceptado sin pago de deducible</option>
                        <option value="reparacion">Aplica pago para reparación</option>
                        <option value="perdida total">Pérdida total</option>
                    </select>
                </div>
            </div>
            <div class="search-buttons">
                <button class="btn btn-secondary" onclick="limpiarBusqueda()">
                    <span>🔄</span> Limpiar
                </button>
                <button class="btn btn-primary" onclick="buscarSiniestros()">
                    <span>🔍</span> Buscar Siniestros
                </button>
            </div>
        </div>

        <!-- Listado de siniestros -->
        <div class="siniestros-list" id="siniestrosList">
            <div class="list-header">
                <h2>
                    <span>📋</span>
                    Resultados de Búsqueda
                </h2>
                <span class="result-count" id="resultCount">Mostrando 0 siniestros</span>
            </div>
            <div id="siniestrosContainer">
                <!-- Los siniestros se cargan dinámicamente aquí -->
            </div>
        </div>
    </div>

    <!-- MODAL DE DETALLE DE SINIESTRO -->
    <div class="modal" id="detalleModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>
                    <span>📋</span>
                    Detalle del Siniestro <span id="detalleId"></span>
                </h2>
                <span class="close-modal" onclick="cerrarModal()">&times;</span>
            </div>
            <div class="modal-body" id="detalleContent">
                <!-- Contenido dinámico -->
            </div>
        </div>
    </div>

    <script src="dashboard.js"></script>
    
</body>
</html>
